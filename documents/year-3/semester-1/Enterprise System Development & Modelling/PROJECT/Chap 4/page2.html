<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans antialiased h-screen flex overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-2xl z-20">
        <div class="h-16 flex items-center justify-center border-b border-slate-700 bg-slate-950">
            <h1 class="text-xl font-bold tracking-wider"><i class="fa-solid fa-shield-halved mr-2 text-blue-400"></i> COMPLY<span class="text-blue-400">HR</span></h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><button class="w-full text-left px-6 py-3 hover:bg-slate-800 transition flex items-center"><i class="fa-solid fa-gauge-high w-6"></i> Dashboard</button></li>
                <!-- Reports Active -->
                <li><button class="w-full text-left px-6 py-3 bg-blue-900 border-l-4 border-blue-400 flex items-center"><i class="fa-solid fa-file-contract w-6"></i> Statutory Reports</button></li>
                <li><button class="w-full text-left px-6 py-3 hover:bg-slate-800 transition flex items-center"><i class="fa-solid fa-sliders w-6"></i> Compliance Rules</button></li>
                <li><button class="w-full text-left px-6 py-3 hover:bg-slate-800 transition flex items-center"><i class="fa-solid fa-list-ol w-6"></i> Audit Logs</button></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-slate-700">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center font-bold">CO</div>
                <div><p class="text-sm font-semibold">Ali Bin Abu</p><p class="text-xs text-gray-400">Compliance Officer</p></div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-16 bg-white shadow-sm flex items-center justify-between px-8 z-10">
            <h2 class="text-xl font-semibold text-gray-800">Statutory Reporting</h2>
            <button class="bg-blue-600 text-white px-4 py-2 rounded-md text-sm font-medium">Export Data</button>
        </header>

        <div class="flex-1 overflow-y-auto p-8 bg-gray-50">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Generation Form -->
                <div class="bg-white p-6 rounded-lg shadow-sm lg:col-span-1 h-fit">
                    <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Generate Report</h3>
                    <form>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Select Month</label>
                            <input type="month" class="w-full border-gray-300 rounded-md shadow-sm p-2 border" value="2025-10">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Report Type</label>
                            <select class="w-full border-gray-300 rounded-md shadow-sm p-2 border">
                                <option>EPF (KWSP) Borang A</option>
                                <option>SOCSO (PERKESO) Form 8A</option>
                                <option>Income Tax (LHDN) CP39</option>
                            </select>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-gray-700 mb-2">Format</label>
                            <div class="flex gap-4">
                                <label class="flex items-center gap-2"><input type="radio" name="format" checked> <span class="text-sm">PDF</span></label>
                                <label class="flex items-center gap-2"><input type="radio" name="format"> <span class="text-sm">Excel</span></label>
                            </div>
                        </div>
                        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md shadow-md">
                            <i class="fa-solid fa-gears mr-2"></i> Generate Now
                        </button>
                    </form>
                </div>

                <!-- History Table -->
                <div class="bg-white p-6 rounded-lg shadow-sm lg:col-span-2">
                    <h3 class="text-lg font-bold text-gray-800 mb-6">Generation History</h3>
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Report Name</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Period</th>
                                <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Status</th>
                                <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200 text-sm">
                            <tr>
                                <td class="px-6 py-4 font-medium text-gray-900">EPF Borang A</td>
                                <td class="px-6 py-4 text-gray-500">Sep 2025</td>
                                <td class="px-6 py-4"><span class="bg-green-100 text-green-800 px-2 py-1 rounded-full text-xs font-bold">Success</span></td>
                                <td class="px-6 py-4 text-right"><button class="text-blue-600">Download</button></td>
                            </tr>
                            <tr>
                                <td class="px-6 py-4 font-medium text-gray-900">Tax CP39</td>
                                <td class="px-6 py-4 text-gray-500">Sep 2025</td>
                                <td class="px-6 py-4"><span class="bg-red-100 text-red-800 px-2 py-1 rounded-full text-xs font-bold">Failed</span></td>
                                <td class="px-6 py-4 text-right"><button class="text-gray-400">Retry</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
